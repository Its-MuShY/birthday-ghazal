<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تولدت مبارک بهترین دوستتت دنیا 💕💕💕</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:tahoma;
background:linear-gradient(#0b1d51,#1b3a7a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(8px);
padding:30px;
border-radius:20px;
text-align:center;
max-width:350px;
z-index:10;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ff4d8d;
color:white;
font-size:18px;
cursor:pointer;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 1.5s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;transform:scale(2);}
}

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:55px;
border-radius:50%;
animation:float 12s linear infinite;
}

.balloon::after{
content:"";
position:absolute;
left:19px;
top:55px;
width:2px;
height:60px;
background:#ddd;
}

@keyframes float{
to{
transform:translateY(-120vh);
}
}

#gift{
display:none;
margin-top:20px;
font-size:22px;
animation:pop .8s;
}

@keyframes pop{
from{transform:scale(.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>

</head>

<body>

<div class="card">

<h1>🎂 تولدت مبارک جیگرر بلا 🎂</h1>

<p>
امیدوارم امسال برات پر از شادی، آرامش و کلی اتفاق قشنگ باشه 💖
</p>

<button onclick="showGift()">
🎁 هدیه باز شود نینی؟
</button>

<div id="gift">
💖 پیشیییه رقصان 💖
<br><br>
از طرف دوست صمیمیت ❤️
</div>

</div>

<script>

for(let i=0;i<100;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

const colors=["#ff5e7e","#ffd93d","#6be6ff","#8d6bff","#6bff95"];

for(let i=0;i<15;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=colors[i%colors.length];

b.style.animationDelay=Math.random()*10+"s";

document.body.appendChild(b);

}

function showGift(){

document.getElementById("gift").style.display="block";

}
</script>

<img
src="https://media.tenor.com/images/4b5d7df0b91d2f37e4b91c53a9c72f0b/tenor.gif"
style="
position:fixed;
bottom:15px;
right:15px;
width:120px;
z-index:9999;
"
alt="cat">

</body>
</html>
